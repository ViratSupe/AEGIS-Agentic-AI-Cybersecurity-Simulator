<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AEGIS — Cyber Simulation Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet" />

  <style>
    /* ── CSS Variables ────────────────────────────────────────────────────── */
    :root {
      --bg-void:      #030508;
      --bg-deep:      #070b10;
      --bg-panel:     #0b1118;
      --bg-card:      #0e1520;
      --bg-card-alt:  #111c2a;

      --grid-line:    rgba(0, 200, 255, 0.04);
      --scan-line:    rgba(0, 200, 255, 0.03);

      /* accent palette */
      --cyan:         #00d4ff;
      --cyan-dim:     rgba(0, 212, 255, 0.15);
      --cyan-glow:    rgba(0, 212, 255, 0.4);

      --red:          #ff3b5c;
      --red-dim:      rgba(255, 59, 92, 0.12);
      --red-glow:     rgba(255, 59, 92, 0.35);

      --blue:         #3b8eff;
      --blue-dim:     rgba(59, 142, 255, 0.12);
      --blue-glow:    rgba(59, 142, 255, 0.35);

      --amber:        #ffb830;
      --amber-dim:    rgba(255, 184, 48, 0.12);
      --amber-glow:   rgba(255, 184, 48, 0.35);

      --green:        #00f59b;
      --green-dim:    rgba(0, 245, 155, 0.12);
      --green-glow:   rgba(0, 245, 155, 0.35);

      --text-primary: #e8f4ff;
      --text-muted:   #4a6480;
      --text-dim:     #253040;

      --border:       rgba(0, 212, 255, 0.08);
      --border-hover: rgba(0, 212, 255, 0.25);

      --font-display: 'Orbitron', monospace;
      --font-ui:      'Rajdhani', sans-serif;
      --font-mono:    'Share Tech Mono', monospace;

      --radius:       4px;
      --radius-lg:    8px;
      --transition:   0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ── Reset & Base ─────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg-void);
      color: var(--text-primary);
      font-family: var(--font-ui);
      font-size: 16px;
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Dot-grid background ──────────────────────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle, rgba(0,212,255,0.07) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Scanline overlay ─────────────────────────────────────────────────── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        var(--scan-line) 2px,
        var(--scan-line) 4px
      );
      pointer-events: none;
      z-index: 0;
    }

    /* ── Layout ───────────────────────────────────────────────────────────── */
    .shell {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    /* ── Header ───────────────────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 48px;
      flex-wrap: wrap;
    }

    .logo-block {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .logo-text {
      font-family: var(--font-display);
      font-size: clamp(28px, 5vw, 44px);
      font-weight: 900;
      letter-spacing: 6px;
      color: var(--cyan);
      text-shadow: 0 0 20px var(--cyan-glow), 0 0 60px rgba(0,212,255,0.15);
      line-height: 1;
    }

    .logo-sub {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 6px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.85); }
    }

    .sys-stats {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .stat-chip {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 1px;
      color: var(--text-muted);
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: var(--radius);
      background: var(--bg-card);
    }

    .stat-chip span {
      color: var(--cyan);
    }

    /* ── Run button ───────────────────────────────────────────────────────── */
    .run-zone {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      margin-bottom: 52px;
    }

    .run-btn {
      position: relative;
      cursor: pointer;
      border: none;
      background: none;
      padding: 0;
      outline: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .run-btn-inner {
      position: relative;
      display: flex;
      align-items: center;
      gap: 14px;
      background: linear-gradient(135deg, rgba(0,212,255,0.08), rgba(0,212,255,0.02));
      border: 1px solid var(--cyan);
      border-radius: var(--radius-lg);
      padding: 16px 40px;
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 4px;
      color: var(--cyan);
      text-transform: uppercase;
      transition: all var(--transition);
      box-shadow: 0 0 20px rgba(0,212,255,0.1), inset 0 0 20px rgba(0,212,255,0.03);
      overflow: hidden;
    }

    .run-btn-inner::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(0,212,255,0.12), transparent);
      transform: translateX(-100%);
      transition: transform 0.6s ease;
    }

    .run-btn:hover .run-btn-inner {
      background: linear-gradient(135deg, rgba(0,212,255,0.15), rgba(0,212,255,0.06));
      box-shadow: 0 0 40px rgba(0,212,255,0.25), 0 0 80px rgba(0,212,255,0.1), inset 0 0 30px rgba(0,212,255,0.06);
      transform: translateY(-2px);
    }

    .run-btn:hover .run-btn-inner::before {
      transform: translateX(100%);
    }

    .run-btn:active .run-btn-inner {
      transform: translateY(0);
    }

    .run-btn:disabled .run-btn-inner {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    .btn-icon {
      width: 18px;
      height: 18px;
      position: relative;
    }

    /* ── Status ticker ────────────────────────────────────────────────────── */
    .ticker {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--cyan);
      letter-spacing: 2px;
      height: 20px;
      overflow: hidden;
      opacity: 0;
      transition: opacity var(--transition);
    }

    .ticker.visible { opacity: 1; }

    .ticker-text {
      display: inline-block;
      animation: ticker-in 0.3s ease forwards;
    }

    @keyframes ticker-in {
      from { transform: translateY(12px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    /* ── Progress bar ─────────────────────────────────────────────────────── */
    .progress-bar {
      width: 420px;
      max-width: 100%;
      height: 2px;
      background: var(--border);
      border-radius: 999px;
      overflow: hidden;
      opacity: 0;
      transition: opacity var(--transition);
    }

    .progress-bar.visible { opacity: 1; }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--cyan), rgba(0,212,255,0.4));
      border-radius: 999px;
      box-shadow: 0 0 10px var(--cyan);
      width: 0%;
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ── Results grid ─────────────────────────────────────────────────────── */
    .results-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    @media (max-width: 700px) {
      .results-grid { grid-template-columns: 1fr; }
    }

    /* ── Card ─────────────────────────────────────────────────────────────── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
      position: relative;
      overflow: hidden;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.5s ease, transform 0.5s ease, border-color var(--transition), box-shadow var(--transition);
    }

    .card.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .card:hover {
      border-color: var(--border-hover);
    }

    /* corner accent */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 40px; height: 40px;
      border-top: 2px solid;
      border-left: 2px solid;
      border-radius: var(--radius-lg) 0 0 0;
      opacity: 0.6;
    }

    .card::after {
      content: '';
      position: absolute;
      bottom: 0; right: 0;
      width: 24px; height: 24px;
      border-bottom: 1px solid;
      border-right: 1px solid;
      border-radius: 0 0 var(--radius-lg) 0;
      opacity: 0.3;
    }

    /* colour themes */
    .card-red   { --card-accent: var(--red);   --card-dim: var(--red-dim);   --card-glow: var(--red-glow);   }
    .card-blue  { --card-accent: var(--blue);  --card-dim: var(--blue-dim);  --card-glow: var(--blue-glow);  }
    .card-amber { --card-accent: var(--amber); --card-dim: var(--amber-dim); --card-glow: var(--amber-glow); }
    .card-green { --card-accent: var(--green); --card-dim: var(--green-dim); --card-glow: var(--green-glow); }

    .card::before, .card::after { border-color: var(--card-accent); }

    .card:hover {
      box-shadow: 0 0 30px var(--card-glow);
      border-color: var(--card-accent);
    }

    /* glow stripe */
    .card-glow-stripe {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--card-accent), transparent);
      opacity: 0.5;
    }

    /* ── Card header ──────────────────────────────────────────────────────── */
    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .card-icon {
      width: 36px;
      height: 36px;
      border-radius: var(--radius);
      background: var(--card-dim);
      border: 1px solid var(--card-accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      box-shadow: 0 0 12px var(--card-glow);
    }

    .card-title-block {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .card-label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--card-accent);
      text-transform: uppercase;
      opacity: 0.8;
    }

    .card-title {
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--text-primary);
    }

    .card-badge {
      margin-left: auto;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 1px;
      padding: 3px 9px;
      border-radius: 999px;
      border: 1px solid var(--card-accent);
      color: var(--card-accent);
      background: var(--card-dim);
      white-space: nowrap;
    }

    /* ── Field rows ───────────────────────────────────────────────────────── */
    .field-row {
      display: flex;
      flex-direction: column;
      gap: 3px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .field-row:last-child { border-bottom: none; }

    .field-key {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .field-val {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--text-primary);
      word-break: break-all;
      line-height: 1.5;
    }

    .field-val.accent { color: var(--card-accent); font-weight: bold; }
    .field-val.ip     { color: var(--cyan); letter-spacing: 1px; }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 2px 8px;
      border-radius: var(--radius);
      border: 1px solid var(--card-accent);
      color: var(--card-accent);
      background: var(--card-dim);
    }

    .tag::before {
      content: '';
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--card-accent);
      box-shadow: 0 0 6px var(--card-accent);
    }

    /* ── Payload block ────────────────────────────────────────────────────── */
    .payload-block {
      font-family: var(--font-mono);
      font-size: 12px;
      background: var(--bg-deep);
      border: 1px solid var(--border);
      border-left: 3px solid var(--card-accent);
      border-radius: var(--radius);
      padding: 10px 14px;
      color: var(--card-accent);
      line-height: 1.7;
      word-break: break-all;
      margin-top: 4px;
    }

    /* ── Threat level chip ────────────────────────────────────────────────── */
    .threat-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 5px 14px;
      border-radius: var(--radius);
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 3px;
    }

    .threat-HIGH   { background: var(--red-dim);   border: 1px solid var(--red);   color: var(--red);   box-shadow: 0 0 12px var(--red-glow);   }
    .threat-MEDIUM { background: var(--amber-dim); border: 1px solid var(--amber); color: var(--amber); box-shadow: 0 0 12px var(--amber-glow); }
    .threat-LOW    { background: var(--green-dim); border: 1px solid var(--green); color: var(--green); box-shadow: 0 0 12px var(--green-glow); }

    /* ── Empty / error state ──────────────────────────────────────────────── */
    .empty-state {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 80px 24px;
      border: 1px dashed var(--border);
      border-radius: var(--radius-lg);
      text-align: center;
    }

    .empty-icon {
      font-size: 36px;
      opacity: 0.3;
    }

    .empty-text {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--text-muted);
      letter-spacing: 2px;
    }

    .error-state {
      grid-column: 1 / -1;
      padding: 20px 24px;
      background: var(--red-dim);
      border: 1px solid var(--red);
      border-radius: var(--radius-lg);
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--red);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* ── Run ID strip ─────────────────────────────────────────────────────── */
    .run-meta {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      flex-wrap: wrap;
      margin-bottom: -4px;
    }

    .run-meta span { color: var(--cyan); }

    /* ── Footer ───────────────────────────────────────────────────────────── */
    .footer {
      margin-top: 60px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .footer-text {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 1px;
    }

    /* ── Spinner ──────────────────────────────────────────────────────────── */
    .spin {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(0,212,255,0.2);
      border-top-color: var(--cyan);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Scrollbar ────────────────────────────────────────────────────────── */
    ::-webkit-scrollbar       { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-void); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--cyan-dim); }
  </style>
</head>

<body>
  <div class="shell">

    <!-- ── Header ──────────────────────────────────────────────────────── -->
    <header class="header">
      <div class="logo-block">
        <div class="logo-text">AEGIS</div>
        <div class="logo-sub">Autonomous Engagement &amp; Guardian Intelligence System</div>
        <div class="status-bar">
          <div class="status-dot"></div>
          <span id="sys-status">SYSTEMS ONLINE</span>
        </div>
      </div>

      <div class="sys-stats">
        <div class="stat-chip">AGENTS <span>3 ACTIVE</span></div>
        <div class="stat-chip">MODE <span>SIMULATION</span></div>
        <div class="stat-chip">BACKEND <span id="backend-url">:8000</span></div>
        <div class="stat-chip">RUNS <span id="run-count">0</span></div>
      </div>
    </header>

    <!-- ── Run control ─────────────────────────────────────────────────── -->
    <div class="run-zone">
      <button class="run-btn" id="run-btn" onclick="runSimulation()">
        <div class="run-btn-inner">
          <svg class="btn-icon" viewBox="0 0 18 18" fill="none">
            <polygon points="4,2 16,9 4,16" fill="currentColor"/>
          </svg>
          RUN SIMULATION
        </div>
      </button>
      <div class="ticker" id="ticker"><span class="ticker-text" id="ticker-text"></span></div>
      <div class="progress-bar" id="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>

    <!-- ── Results ─────────────────────────────────────────────────────── -->
    <div class="results-grid" id="results">
      <div class="empty-state">
        <div class="empty-icon">◈</div>
        <div class="empty-text">NO SIMULATION DATA — PRESS RUN TO BEGIN</div>
      </div>
    </div>

    <!-- ── Footer ──────────────────────────────────────────────────────── -->
    <footer class="footer">
      <div class="footer-text">AEGIS v1.0 · CYBERSECURITY MULTI-AGENT SIMULATOR</div>
      <div class="footer-text" id="last-run">LAST RUN: —</div>
    </footer>

  </div><!-- /shell -->

  <!-- ══════════════════════════════════════════════════════════════════════
       JavaScript
  ════════════════════════════════════════════════════════════════════════ -->
  <script>
    /* ── Config ──────────────────────────────────────────────────────────── */
// 🌍 AUTO SWITCH: LOCAL vs DEPLOYED
    const API_BASE = window.location.hostname === "localhost" 
        ? "http://127.0.0.1:8000"
        : "https://your-backend-url.onrender.com";  // 🔥 replace later

    const RUN_URL = `${API_BASE}/run`;

    let runCount = 0;

    /* ── DOM refs ────────────────────────────────────────────────────────── */
    const $btn      = document.getElementById('run-btn');
    const $ticker   = document.getElementById('ticker');
    const $tickerTx = document.getElementById('ticker-text');
    const $progBar  = document.getElementById('progress-bar');
    const $progFill = document.getElementById('progress-fill');
    const $results  = document.getElementById('results');
    const $runCount = document.getElementById('run-count');
    const $lastRun  = document.getElementById('last-run');

    /* ── Status messages sequence ────────────────────────────────────────── */
    const STATUS_STEPS = [
      { msg: '▸ INITIALISING AGENTS...',   pct: 10 },
      { msg: '▸ SIMULATING ATTACK...',     pct: 30 },
      { msg: '▸ ANALYZING THREAT...',      pct: 55 },
      { msg: '▸ MAKING DECISION...',       pct: 75 },
      { msg: '▸ EXECUTING ACTION...',      pct: 90 },
      { msg: '▸ COMPILING RESULTS...',     pct: 98 },
    ];

    /* ── Helpers ─────────────────────────────────────────────────────────── */
    function setTicker(msg) {
      $tickerTx.textContent = msg;
      // Re-trigger animation
      $tickerTx.style.animation = 'none';
      requestAnimationFrame(() => {
        $tickerTx.style.animation = '';
      });
      $ticker.classList.add('visible');
    }

    function setProgress(pct) {
      $progFill.style.width = pct + '%';
    }

    function showProgress() {
      $progBar.classList.add('visible');
      $ticker.classList.add('visible');
    }

    function hideProgress() {
      $progBar.classList.remove('visible');
      $ticker.classList.remove('visible');
      setProgress(0);
    }

    function delay(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    /* animate through status steps */
    async function animateSteps() {
      for (const step of STATUS_STEPS) {
        setTicker(step.msg);
        setProgress(step.pct);
        await delay(380);
      }
    }

    /* ── Formatters ──────────────────────────────────────────────────────── */
    function formatAttackType(t) {
      return (t || 'UNKNOWN').replace(/_/g, ' ').toUpperCase();
    }

    function formatTime(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      return d.toUTCString().replace('GMT', 'UTC');
    }

    function nullOrDash(v) {
      return (v === null || v === undefined) ? '—' : v;
    }

    /* ── Card builders ───────────────────────────────────────────────────── */

    /* generic field row */
    function fieldRow(key, valHtml) {
      return `
        <div class="field-row">
          <div class="field-key">${key}</div>
          <div class="field-val">${valHtml}</div>
        </div>`;
    }

    /* STEP 1 — Attack card (red) */
    function buildAttackCard(a) {
      const type  = formatAttackType(a.attack_type);
      const ports = a.ports_scanned ? a.ports_scanned.join(', ') : null;
      const open  = a.open_ports    ? a.open_ports.join(', ')    : null;

      return `
        <div class="card card-red" id="card-attack">
          <div class="card-glow-stripe"></div>
          <div class="card-header">
            <div class="card-icon">⚡</div>
            <div class="card-title-block">
              <div class="card-label">Step 01 · RedTeamAgent</div>
              <div class="card-title">ATTACK GENERATED</div>
            </div>
            <div class="card-badge">${type}</div>
          </div>
          ${fieldRow('ATTACK TYPE',  `<span class="tag">${type}</span>`)}
          ${fieldRow('SOURCE IP',    `<span class="field-val ip">${a.source_ip || '—'}</span>`)}
          ${fieldRow('TARGET IP',    `<span class="field-val ip">${a.target_ip || '—'}</span>`)}
          ${fieldRow('TIMESTAMP',    formatTime(a.timestamp))}
          ${a.payload ? fieldRow('PAYLOAD', `<div class="payload-block">${escHtml(String(a.payload))}</div>`) : ''}
          ${a.attempts ? fieldRow('ATTEMPTS', `<span class="field-val accent">${a.attempts}</span>`) : ''}
          ${a.http_method ? fieldRow('HTTP METHOD', a.http_method) : ''}
          ${a.endpoint    ? fieldRow('ENDPOINT',    escHtml(a.endpoint)) : ''}
          ${a.response_code ? fieldRow('RESPONSE CODE', a.response_code) : ''}
          ${ports ? fieldRow('PORTS SCANNED', ports) : ''}
          ${open  ? fieldRow('OPEN PORTS', `<span class="field-val accent">${open}</span>`) : ''}
          ${fieldRow('LOG ID', `<small style="font-size:10px;color:var(--text-muted)">${a.log_id || '—'}</small>`)}
        </div>`;
    }

    /* STEP 2 — Analysis card (blue) */
    function buildAssessmentCard(a) {
      const level     = (a.threat_level || 'UNKNOWN').toUpperCase();
      const chipClass = ['HIGH','MEDIUM','LOW'].includes(level) ? `threat-${level}` : '';
      return `
        <div class="card card-blue" id="card-assessment">
          <div class="card-glow-stripe"></div>
          <div class="card-header">
            <div class="card-icon">🛡</div>
            <div class="card-title-block">
              <div class="card-label">Step 02 · BlueTeamAgent</div>
              <div class="card-title">THREAT ASSESSMENT</div>
            </div>
          </div>
          ${fieldRow('THREAT LEVEL', `<div class="threat-chip ${chipClass}">${level}</div>`)}
          ${fieldRow('REASON', `<span style="font-size:12px;line-height:1.7">${escHtml(a.reason || '—')}</span>`)}
          ${fieldRow('RECOMMENDED ACTION', `<span class="tag">${(a.recommended_action||'—').replace(/_/g,' ').toUpperCase()}</span>`)}
          ${fieldRow('SOURCE IP', `<span class="field-val ip">${a.source_ip || '—'}</span>`)}
          ${fieldRow('ASSESSED BY', a.assessed_by || '—')}
          ${fieldRow('ASSESSED AT', formatTime(a.assessed_at))}
        </div>`;
    }

    /* STEP 3 — Decision card (amber) */
    function buildPlanCard(p) {
      const dec = (p.decision || 'UNKNOWN').toUpperCase().replace(/_/g,' ');
      return `
        <div class="card card-amber" id="card-plan">
          <div class="card-glow-stripe"></div>
          <div class="card-header">
            <div class="card-icon">⚙</div>
            <div class="card-title-block">
              <div class="card-label">Step 03 · PlannerAgent</div>
              <div class="card-title">ACTION DECISION</div>
            </div>
            <div class="card-badge">${dec}</div>
          </div>
          ${fieldRow('DECISION', `<span class="field-val accent" style="font-size:16px;letter-spacing:2px">${dec}</span>`)}
          ${fieldRow('EXPLANATION', `<span style="font-size:12px;line-height:1.7">${escHtml(p.explanation || '—')}</span>`)}
          ${fieldRow('TARGET IP', `<span class="field-val ip">${p.target_ip || '—'}</span>`)}
          ${fieldRow('PLANNED BY', p.planned_by || '—')}
          ${fieldRow('PLANNED AT', formatTime(p.planned_at))}
        </div>`;
    }

    /* STEP 4 — Action card (green) */
    function buildActionCard(ac) {
      const act = (ac.action_taken || 'UNKNOWN').toUpperCase().replace(/_/g,' ');
      return `
        <div class="card card-green" id="card-action">
          <div class="card-glow-stripe"></div>
          <div class="card-header">
            <div class="card-icon">✓</div>
            <div class="card-title-block">
              <div class="card-label">Step 04 · ActionEngine</div>
              <div class="card-title">ACTION EXECUTED</div>
            </div>
            <div class="card-badge">${act}</div>
          </div>
          ${fieldRow('ACTION TAKEN', `<span class="field-val accent" style="font-size:16px;letter-spacing:2px">${act}</span>`)}
          ${fieldRow('TARGET IP', `<span class="field-val ip">${ac.target_ip || '—'}</span>`)}
          ${fieldRow('DETAIL', `<span style="font-size:12px;line-height:1.7">${escHtml(ac.detail || '—')}</span>`)}
        </div>`;
    }

    /* ── Render pipeline results ──────────────────────────────────────────── */
    function renderResults(data) {
      const runId  = data.run_id || '—';
      const ranAt  = formatTime(data.ran_at);

      $results.innerHTML = `
        <div class="run-meta">
          <span>RUN ID: <span>${runId}</span></span>
          <span>EXECUTED: <span>${ranAt}</span></span>
          <span>STATUS: <span>${(data.status || 'completed').toUpperCase()}</span></span>
        </div>
        ${buildAttackCard(data.attack     || {})}
        ${buildAssessmentCard(data.assessment || {})}
        ${buildPlanCard(data.plan         || {})}
        ${buildActionCard(data.action     || {})}
      `;

      // staggered reveal
      const cards = $results.querySelectorAll('.card');
      cards.forEach((card, i) => {
        setTimeout(() => card.classList.add('visible'), i * 130);
      });
    }

    /* ── Render error ────────────────────────────────────────────────────── */
    function renderError(msg) {
      $results.innerHTML = `
        <div class="error-state">
          <div class="spin"></div>
          <span>ERROR: ${escHtml(msg)}</span>
        </div>`;
    }

    /* ── Main simulation function ─────────────────────────────────────────── */
    async function runSimulation() {
      $btn.disabled = true;
      showProgress();
      $results.innerHTML = '';

      try {
        /* Run status animation in parallel with the fetch */
        const [response] = await Promise.all([
            fetch(RUN_URL, {
            method: "GET",
            headers: {
                "Content-Type": "application/json"
            }
        }),
        animateSteps(),
        ]);

        if (!response.ok) {
          const err = await response.text();
          throw new Error(`HTTP ${response.status} — ${err}`);
        }

        const data = await response.json();

        setTicker('▸ DONE');
        setProgress(100);
        await delay(300);

        renderResults(data);

        runCount++;
        $runCount.textContent = runCount;
        $lastRun.textContent  = 'LAST RUN: ' + new Date().toLocaleTimeString();

      } catch (err) {
        setTicker('▸ ERROR');
        renderError(err.message || 'Connection failed. Is the backend running?');
      } finally {
        await delay(600);
        hideProgress();
        $btn.disabled = false;
      }
    }

    /* ── Escape HTML ─────────────────────────────────────────────────────── */
    function escHtml(s) {
      return String(s)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;');
    }

    /* ── Keyboard shortcut: Enter to run ────────────────────────────────── */
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !$btn.disabled) runSimulation();
    });
  </script>
</body>
</html>
